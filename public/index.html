<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick Fridge Fix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <header class="header">
      <h1>🍳 Quick Fridge Fix</h1>
      <p>Dinner ideas from whatever's in your fridge.</p>
    </header>

    <section class="input-section">
      <label for="ingredients" class="visually-hidden">Ingredients List</label>
      <textarea id="ingredients" placeholder="e.g. chicken, garlic, pasta, half a lemon..."></textarea>

      <div class="servings-control">
        <span class="servings-label">Servings:</span>
        <div class="stepper">
          <button type="button" id="decrease-btn" aria-label="Decrease servings">-</button>
          <input type="number" id="servings" value="2" min="1" max="20" readonly>
          <button type="button" id="increase-btn" aria-label="Increase servings">+</button>
        </div>
      </div>

      <button id="find-btn">Find Recipes</button>

      <!-- QFF-006: Household / Who's eating -->
      <div id="household-section" class="hidden">
        <span class="section-title">Who's eating?</span>
        <div id="profile-chips"></div>
        <button id="add-person-btn" class="add-person-btn">+ Add person</button>
        <div id="add-person-form" class="hidden">
          <input type="text" id="person-name" placeholder="Name (e.g. Mia, Dad)" maxlength="50">
          <div id="flag-checkboxes"></div>
          <div class="add-person-actions">
            <button id="save-person-btn">Add</button>
            <button id="cancel-person-btn" type="button">Cancel</button>
          </div>
        </div>
      </div>
      <div id="household-nudge" class="hidden">
        <p class="household-nudge-text"><a href="#" id="signin-nudge-link">Sign in</a> to save your family's preferences</p>
      </div>
    </section>

    <div id="error-msg" class="error-message hidden"></div>

    <div id="skeleton" class="loader-container hidden">
      <article class="card skeleton-card"><h3 class="skeleton-text skeleton-title"></h3><p class="skeleton-text skeleton-subtitle"></p></article>
      <article class="card skeleton-card"><h3 class="skeleton-text skeleton-title"></h3><p class="skeleton-text skeleton-subtitle"></p></article>
      <article class="card skeleton-card"><h3 class="skeleton-text skeleton-title"></h3><p class="skeleton-text skeleton-subtitle"></p></article>
    </div>

    <section id="results" class="hidden">
      <!-- Recipes will be injected here -->
    </section>
  </main>

  <script src="app.js" defer></script>
  <footer class="build-footer"><span id="build-version">build: —</span></footer>
</body>
</html>
